<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Test Inventario</title>
</head>
<body>

<h2>Captura de inventario</h2>

<input id="nombre" placeholder="Nombre"><br><br>
<input id="unidad" placeholder="Unidad"><br><br>
<input id="stock" type="number" placeholder="Stock"><br><br>
<input id="precio" type="number" placeholder="Precio"><br><br>

<button onclick="guardar()">Guardar en Sheets</button>

<p id="msg"></p>

<script>
const API = "TU_URL_DE_APPS_SCRIPT_AQUI"; // ← pega tu URL

async function guardar() {

  const data = [{
    id: Date.now(),
    nombre: document.getElementById("nombre").value,
    unidad: document.getElementById("unidad").value,
    grupo: "Prueba",
    categoria: "ambos",
    stock: Number(document.getElementById("stock").value),
    piezasPorUnidad: 0,
    precio: Number(document.getElementById("precio").value)
  }];

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        action: "saveInsumos",
        data: data
      })
    });

    const r = await res.json();

    document.getElementById("msg").innerText = "Guardado correctamente ✅";

  } catch (err) {
    document.getElementById("msg").innerText = "Error ❌";
    console.error(err);
  }
}
</script>

</body>
</html>
